<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encuesta</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#5f9c6a,#2e4d32);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:10px;
}

.pregunta{
font-size:18px;
margin-bottom:20px;
}

.botones{
display:flex;
gap:10px;
margin-bottom:20px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.favor{
background:#4CAF50;
color:white;
}

.contra{
background:#e74c3c;
color:white;
}

button:hover{
transform:scale(1.05);
}

textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
}

.resultados{
margin-top:20px;
background:#f3f3f3;
padding:10px;
border-radius:10px;
}

</style>

</head>
<body>

<div class="container">

<h2>Encuesta</h2>

<div class="pregunta">
¿Estás a favor o en contra de que <b>Jeison</b> regrese con <b>Zharik</b>?
</div>

<div class="botones">
<button class="favor" onclick="votar('favor')">👍 A favor</button>
<button class="contra" onclick="votar('contra')">👎 En contra</button>
</div>

<label><b>¿Por qué?</b></label>
<textarea rows="3" placeholder="Escribe tu opinión..."></textarea>

<label><b>¿Qué crees que pasaría si esto sucede?</b></label>
<textarea rows="3" placeholder="Tu respuesta..."></textarea>

<div class="resultados">
<p>👍 A favor: <span id="favor">0</span></p>
<p>👎 En contra: <span id="contra">0</span></p>
</div>

</div>

<script>

let votosFavor = 0;
let votosContra = 0;

function votar(tipo){

if(tipo === "favor"){
votosFavor++;
document.getElementById("favor").textContent = votosFavor;
}

if(tipo === "contra"){
votosContra++;
document.getElementById("contra").textContent = votosContra;
}

}

</script>

</body>
</html>
