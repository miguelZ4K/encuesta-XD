<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encuesta</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#5f9c6a,#2e4d32);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:10px;
}

.pregunta{
font-size:18px;
margin-bottom:20px;
}

.botones{
display:flex;
gap:10px;
margin-bottom:20px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.favor{
background:#4CAF50;
color:white;
}

.contra{
background:#e74c3c;
color:white;
}

button:hover{
transform:scale(1.05);
}

textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
}

.resultados{
margin-top:20px;
background:#f3f3f3;
padding:10px;
border-radius:10px;
}

.barra{
height:20px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-top:5px;
}

.progresoFavor{
height:100%;
background:#4CAF50;
width:0%;
}

.progresoContra{
height:100%;
background:#e74c3c;
width:0%;
}

</style>

</head>
<body>

<div class="container">

<h2>Encuesta</h2>

<div class="pregunta">
¿Estás a favor o en contra de que <b>Jeison</b> regrese con <b>Zharik</b>?
</div>

<div class="botones">
<button class="favor" onclick="votar('favor')">👍 A favor</button>
<button class="contra" onclick="votar('contra')">👎 En contra</button>
</div>

<label><b>¿Por qué?</b></label>
<textarea id="porque" rows="3"></textarea>

<label><b>¿Qué crees que pasaría si esto sucede?</b></label>
<textarea id="pasaria" rows="3"></textarea>

<button onclick="enviarEncuesta()">Enviar respuesta</button>

<div class="resultados">

<p>👍 A favor: <span id="favor">0</span></p>

<div class="barra">
<div class="progresoFavor" id="barraFavor"></div>
</div>

<p>👎 En contra: <span id="contra">0</span></p>

<div class="barra">
<div class="progresoContra" id="barraContra"></div>
</div>

</div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyT7kSyqeVbuKBTDbOc_cgjsymCxKpR1OWzA-SKygHM26O_808Gf0QFD5S7ZZRhMspOqw/exec";

let votosFavor = localStorage.getItem("favor") || 0;
let votosContra = localStorage.getItem("contra") || 0;

let votoUsuario = localStorage.getItem("votoUsuario");

document.getElementById("favor").textContent = votosFavor;
document.getElementById("contra").textContent = votosContra;

actualizarGrafica();

function votar(tipo){

if(votoUsuario){
alert("Ya votaste en esta encuesta");
return;
}

if(tipo === "favor"){
votosFavor++;
localStorage.setItem("favor", votosFavor);
localStorage.setItem("votoUsuario","favor");
}

if(tipo === "contra"){
votosContra++;
localStorage.setItem("contra", votosContra);
localStorage.setItem("votoUsuario","contra");
}

document.getElementById("favor").textContent = votosFavor;
document.getElementById("contra").textContent = votosContra;

actualizarGrafica();

}

function actualizarGrafica(){

let total = Number(votosFavor) + Number(votosContra);

if(total === 0) return;

let porcentajeFavor = (votosFavor / total) * 100;
let porcentajeContra = (votosContra / total) * 100;

document.getElementById("barraFavor").style.width = porcentajeFavor + "%";
document.getElementById("barraContra").style.width = porcentajeContra + "%";

}

function enviarEncuesta(){

const opinion = localStorage.getItem("votoUsuario");
const porque = document.getElementById("porque").value;
const pasaria = document.getElementById("pasaria").value;

fetch(scriptURL, {
method: "POST",
body: JSON.stringify({
opinion: opinion,
porque: porque,
pasaria: pasaria
})
})
.then(res => alert("Respuesta enviada"))
.catch(err => alert("Error al enviar"));

}

</script>

</body>
</html>
